services:
  - type: web
    name: amro-web-trial
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_API_KEY_INTEL
        sync: false
      - key: OPENAI_API_KEY_JUDGE
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

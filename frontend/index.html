<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- layout: mobile-first v2 -->
<title>AMRO ENGIN AI</title>
<!-- PocketBase JS SDK (local first — avoids CDN tracking-prevention blocks) -->
<script src="/static/vendor/pocketbase.umd.js"></script>
<script>
if (!window.PocketBase) {
  document.write('<script src="https://cdn.jsdelivr.net/npm/pocketbase@0.21.3/dist/pocketbase.umd.js"><\/script>');
}
</script>
<!-- Inter + JetBrains Mono fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Backgrounds */
  --bg:          #030712;
  --bg-grad:     radial-gradient(circle at top left, #07111f 0%, #050b16 35%, #030712 100%);
  --panel:       rgba(10,18,35,0.92);
  --surface:     #08101d;
  --surface2:    #0b1526;
  --surface3:    rgba(10,18,35,0.95);
  --border:      rgba(70,120,255,0.14);
  --border-glow: rgba(59,130,246,0.22);

  /* Text */
  --text:  #f8fafc;
  --text2: #94a3b8;
  --muted: #64748b;

  /* Brand */
  --blue:     #3b82f6;
  --blue2:    #2563eb;
  --blue-dim: #1d3a6e;
  --blue-glow:rgba(37,99,235,0.10);

  /* Signal green */
  --green:     #22c55e;
  --green2:    #16a34a;
  --green-dim: rgba(34,197,94,0.12);

  /* Alerts */
  --red:    #ef4444;
  --red-dim:#7f1d1d;
  --orange: #f59e0b;
  --purple: #a78bfa;
  --purple-dim:#3b1f6e;

  /* Shadows */
  --shadow-card: 0 0 0 1px rgba(59,130,246,0.12), 0 10px 40px rgba(0,0,0,0.45), 0 0 30px rgba(37,99,235,0.08);
  --shadow-glow: 0 0 40px rgba(59,130,246,0.12);
  --radius-card: 18px;
  --radius-sm:   12px;
  --gap:         20px;
}
body {
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  background:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
/* Global premium scrollbar */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(59,130,246,0.18); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:rgba(59,130,246,0.32); }
* { scrollbar-width:thin; scrollbar-color:rgba(59,130,246,0.18) transparent; }
a { color:var(--blue); text-decoration:none; }
button { cursor:pointer; font-family:inherit; }

/* Navbar */
.navbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:61px;
  background:rgba(5,10,20,0.96);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(16px);
  box-shadow:0 1px 0 rgba(59,130,246,0.08);
}
.logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
.logo-icon {
  width:34px; height:34px; border-radius:9px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:14px; color:white;
  box-shadow:0 0 16px rgba(37,99,235,0.35);
}
.logo-text { font-weight:800; font-size:15px; letter-spacing:2px; color:var(--text); }
.logo-sub  { font-size:9px; color:var(--muted); letter-spacing:1.5px; }
.nav-right { display:flex; align-items:center; gap:10px; }
.nav-tier { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; display:none; }
.tier-free { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.tier-subscription { background:var(--blue-dim); color:#93c5fd; border:1px solid #2563eb; }
.tier-premium { background:var(--purple-dim); color:var(--purple); border:1px solid #7c3aed; }
.btn { padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600; border:none; transition:all .2s ease; letter-spacing:.3px; }
.btn:hover { transform:translateY(-1px); }
.btn-primary {
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:white;
  box-shadow:0 4px 16px rgba(37,99,235,0.30);
}
.btn-primary:hover { box-shadow:0 6px 24px rgba(37,99,235,0.40); }
.btn-outline {
  background:transparent; color:var(--text2);
  border:1px solid rgba(255,255,255,0.10);
}
.btn-outline:hover { border-color:var(--border-glow); color:var(--text); }
.btn-google { display:flex; align-items:center; gap:8px; background:white; color:#1a1a1a; padding:8px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600; }
.btn-google svg { width:18px; height:18px; flex-shrink:0; }

/* Email auth modal */
.auth-modal-overlay { position:fixed; inset:0; background:rgba(10,14,26,.85); z-index:9500; display:none; align-items:center; justify-content:center; padding:16px; }
.auth-modal-overlay.show { display:flex; }
.auth-modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px 24px; width:100%; max-width:400px; box-shadow:0 24px 48px rgba(0,0,0,.45); }
.auth-modal h3 { margin:0 0 6px; font-size:18px; }
.auth-modal .auth-sub { color:var(--muted); font-size:13px; margin-bottom:18px; line-height:1.5; }
.auth-tabs { display:flex; gap:8px; margin-bottom:16px; }
.auth-tab { flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; }
.auth-tab.active { background:var(--blue-dim); color:#93c5fd; border-color:#2563eb; }
.auth-field { margin-bottom:12px; }
.auth-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
.auth-field input { width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:14px; box-sizing:border-box; }
.auth-actions { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
.auth-link { background:none; border:none; color:#93c5fd; font-size:12px; cursor:pointer; text-align:center; padding:4px; }
.auth-divider { text-align:center; color:var(--muted); font-size:12px; margin:12px 0; }

/* Toast */
.toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:13px; z-index:9999; transform:translateY(80px); opacity:0; transition:all .3s; max-width:320px; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { border-color:var(--green); }
.toast.error   { border-color:var(--red); }

/* Loading overlay */
.loading-overlay { position:fixed; inset:0; background:rgba(10,14,26,.8); z-index:9000; display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.loading-overlay.show { display:flex; }
.spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Pages */
.page { display:none; }
.page.active { display:block; }

/* Landing */
.hero { text-align:center; padding:80px 32px 60px; max-width:700px; margin:0 auto; }
.hero-badge { display:inline-block; background:var(--blue-dim); color:#93c5fd; font-size:11px; font-weight:700; padding:4px 14px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; margin-bottom:24px; border:1px solid #2563eb; }
.hero h1 { font-size:42px; font-weight:800; line-height:1.2; margin-bottom:20px; }
.hero h1 span { color:var(--blue); }
.hero p { font-size:16px; color:var(--muted); line-height:1.7; margin-bottom:36px; }
.hero-cta { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.features { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:900px; margin:0 auto 60px; padding:0 32px; }
.feature-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
.feature-icon { font-size:24px; margin-bottom:10px; }
.feature-title { font-weight:700; margin-bottom:6px; }
.feature-desc { font-size:12px; color:var(--muted); line-height:1.5; }
.pricing { max-width:900px; margin:0 auto 80px; padding:0 32px; }
.pricing h2 { text-align:center; font-size:26px; font-weight:700; margin-bottom:8px; }
.pricing-sub { text-align:center; color:var(--muted); font-size:14px; margin-bottom:32px; }
.pricing-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
.price-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; position:relative; }
.price-card.featured { border-color:var(--blue); }
.price-badge { position:absolute; top:-10px; left:50%; transform:translateX(-50%); background:var(--blue); color:white; font-size:11px; font-weight:700; padding:2px 12px; border-radius:20px; }
.price-tier { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:8px; }
.price-amount { font-size:32px; font-weight:800; margin-bottom:4px; }
.price-period { font-size:12px; color:var(--muted); margin-bottom:16px; }
.price-items { list-style:none; margin-bottom:20px; }
.price-items li { font-size:12px; padding:5px 0; color:var(--muted); display:flex; gap:8px; }
.price-items li::before { content:'\u2713'; color:var(--green); font-weight:700; flex-shrink:0; }
.price-items li.locked::before { content:'\u2717'; color:var(--border); }
.price-items li.locked { opacity:.5; }

/* Dashboard */
/* .dashboard replaced by .main-content (sidebar layout) */
.dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.dash-title { font-size:22px; font-weight:800; letter-spacing:-.3px; background:linear-gradient(90deg,#f8fafc,#94a3b8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.dash-right { display:flex; align-items:center; gap:10px; }
.dash-time { font-size:11px; color:var(--muted); font-family:'JetBrains Mono','Fira Code',monospace; letter-spacing:.04em; }
.btn-refresh {
  background:transparent; border:1px solid rgba(255,255,255,0.08);
  color:#64748b; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600;
  letter-spacing:.02em; transition:color .15s, border-color .15s;
}
.btn-refresh:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.14); color:#94a3b8; }
.symbol-bar { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.sym-btn { padding:6px 16px; border-radius:6px; font-size:13px; font-weight:600; background:var(--surface); border:1px solid var(--border); color:var(--muted); transition:all .15s; }
.sym-btn.active, .sym-btn:hover { background:var(--blue-dim); border-color:var(--blue); color:#93c5fd; }
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-card {
  background:linear-gradient(180deg,rgba(10,18,35,0.95),rgba(7,12,24,0.95));
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:16px 18px;
  box-shadow:0 8px 30px rgba(0,0,0,0.35);
  transition:transform .2s ease, box-shadow .2s ease;
}
.stat-card:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(0,0,0,0.45),0 0 0 1px rgba(59,130,246,0.10); }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.stat-value { font-size:24px; font-weight:800; }
.stat-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.text-green  { color:var(--green);  }
.text-red    { color:var(--red);    }
.text-orange { color:var(--orange); }
.text-blue   { color:var(--blue);   }
.text-purple { color:var(--purple); }
/* Direction glow on large text */
.signal-direction.text-green { text-shadow:0 0 24px rgba(34,197,94,0.40); }
.signal-direction.text-red   { text-shadow:0 0 24px rgba(239,68,68,0.40); }
.main-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--gap); margin-bottom:var(--gap); }
.card {
  background:linear-gradient(180deg,rgba(10,18,35,0.95),rgba(7,12,24,0.95));
  border:1px solid var(--border);
  border-radius:var(--radius-card);
  padding:20px;
  box-shadow:var(--shadow-card);
  transition:transform .25s ease, box-shadow .25s ease;
}
.card:hover { transform:translateY(-2px); box-shadow:var(--shadow-card),var(--shadow-glow); }
.card-title { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.12em; margin-bottom:16px; opacity:.8; }
.signal-direction { font-size:34px; font-weight:900; letter-spacing:2px; margin-bottom:4px; line-height:1; }
.signal-price { font-size:18px; font-weight:700; margin-bottom:12px; font-family:'JetBrains Mono','Fira Code',monospace; letter-spacing:.04em; }
.confidence-bar-wrap { margin-bottom:12px; }
.confidence-label { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
.confidence-bar { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.confidence-fill { height:100%; border-radius:4px; transition:width 1s ease; }
.blurred-value { filter:blur(6px); user-select:none; }
.lock-hint { font-size:11px; color:var(--orange); margin-top:8px; display:flex; align-items:center; gap:6px; }
.reasons { list-style:none; }
.reasons li { font-size:12px; color:var(--muted); padding:5px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; line-height:1.4; }
.reasons li:last-child { border-bottom:none; }
.reasons li::before { content:'·'; color:var(--blue); font-size:16px; line-height:1; flex-shrink:0; }
.regime-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; font-weight:700; font-size:14px; margin-bottom:12px; }
.regime-trending-up { background:var(--green-dim); color:var(--green); border:1px solid #16a34a; }
.regime-trending-down { background:var(--red-dim); color:var(--red); border:1px solid #dc2626; }
.regime-ranging { background:#1c1700; color:var(--orange); border:1px solid #b45309; }
.regime-volatile { background:#2d1a00; color:#fb923c; border:1px solid #ea580c; }
.regime-breakout { background:var(--purple-dim); color:var(--purple); border:1px solid #7c3aed; }
.regime-unknown { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.regime-desc { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:12px; }
.advice-box { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:12px; line-height:1.5; }
.advice-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.verdict-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border-radius:8px; font-weight:700; font-size:13px; margin-bottom:12px; }
.verdict-valid { background:var(--green-dim); color:var(--green); }
.verdict-weak { background:#1c1700; color:var(--orange); }
.verdict-conflicted { background:var(--red-dim); color:var(--red); }
.verdict-invalid { background:#1a0000; color:#f87171; }
.trust-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.trust-score { font-size:28px; font-weight:800; }
.trust-label { font-size:11px; color:var(--muted); }
.audit-section { margin-bottom:10px; }
.audit-section-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:8px; opacity:.75; }
.audit-items { list-style:none; }
.audit-items li { font-size:12px; color:var(--muted); padding:3px 0; display:flex; gap:6px; }
.confirm-item::before { content:'✓'; color:var(--green); font-weight:700; }
.conflict-item::before { content:'⚠'; color:var(--orange); }
.upgrade-banner { background:linear-gradient(135deg,#1d3a6e,#2e1065); border:1px solid var(--blue); border-radius:12px; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:16px; }
.upgrade-text h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.upgrade-text p { font-size:12px; color:#93c5fd; }
.btn-upgrade { background:var(--blue); color:white; padding:10px 20px; border-radius:8px; border:none; font-weight:700; font-size:13px; white-space:nowrap; cursor:pointer; }
.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.metric-item { background:var(--surface2); border-radius:8px; padding:10px 12px; display:flex; justify-content:space-between; align-items:center; }
.metric-key { font-size:11px; color:var(--muted); }
.metric-val { font-size:13px; font-weight:700; }
.delayed-banner { background:#1c1000; border:1px solid #78350f; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--orange); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.error-banner { background:#1a0000; border:1px solid var(--red); border-radius:8px; padding:12px 16px; font-size:13px; color:#fca5a5; margin-bottom:16px; }
.hidden { display:none !important; }
.mt-16 { margin-top:16px; }
.text-muted-val { color:var(--muted); }
.abstain-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; font-weight:800; font-size:16px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); margin-bottom:10px; letter-spacing:1px; }
.gov-reason-box { font-size:11px; color:var(--orange); background:#1c1000; border:1px solid #78350f; border-radius:6px; padding:8px 12px; margin-bottom:10px; line-height:1.6; word-break:break-all; }
.gov-approved-box { font-size:11px; color:var(--green); background:var(--green-dim); border:1px solid #16a34a; border-radius:6px; padding:6px 12px; margin-bottom:10px; }
.audit-scores-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px; }
.audit-score-item { background:var(--surface2); border-radius:6px; padding:7px 10px; display:flex; justify-content:space-between; align-items:center; }
.audit-score-key { font-size:10px; color:var(--muted); }
.audit-score-val { font-size:12px; font-weight:700; }
.brain-votes-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.brain-vote { padding:3px 10px; border-radius:4px; font-size:11px; font-weight:700; }
.brain-vote-long { background:var(--green-dim); color:var(--green); border:1px solid #16a34a; }
.brain-vote-short { background:var(--red-dim); color:var(--red); border:1px solid #dc2626; }
.brain-vote-abstain { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.brain-vote-neutral { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.risk-normal { color:var(--green); }
.risk-defensive { color:var(--orange); }
.risk-no-trade { color:var(--muted); }
.audit-skipped-box { text-align:center; padding:16px 0; color:var(--muted); font-size:12px; }

/* Position Calculator */
.calc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.calc-field { display:flex; flex-direction:column; gap:4px; }
.calc-label { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
.calc-input-wrap { display:flex; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.calc-input { background:transparent; border:none; outline:none; color:var(--text); font-size:14px; font-weight:700; padding:8px 10px; width:100%; font-family:inherit; }
.calc-input:focus { border-color:var(--blue); }
.calc-unit { font-size:11px; color:var(--muted); padding:0 8px; white-space:nowrap; }
.calc-entry-bar { display:flex; justify-content:space-between; align-items:center; background:var(--surface2); border-radius:6px; padding:6px 10px; margin-bottom:10px; font-size:12px; }
.calc-results { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.calc-result-row { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-bottom:1px solid var(--border); }
.calc-result-row:last-child { border-bottom:none; }
.calc-result-label { font-size:11px; color:var(--muted); }
.calc-result-val { font-size:15px; font-weight:800; }
.calc-result-divider { height:1px; background:var(--border); margin:0; }
.calc-lot-breakdown { font-size:10px; color:var(--muted); text-align:center; margin-top:8px; line-height:1.6; }
.calc-direction-toggle { display:flex; gap:6px; margin-bottom:10px; }
.calc-dir-btn { flex:1; padding:5px; border-radius:5px; font-size:11px; font-weight:700; border:1px solid var(--border); background:var(--surface2); color:var(--muted); cursor:pointer; }
.calc-dir-btn.active-long { background:var(--green-dim); color:var(--green); border-color:#16a34a; }
.calc-dir-btn.active-short { background:var(--red-dim); color:var(--red); border-color:#dc2626; }

/* Candlestick Chart */
.chart-card {
  background:linear-gradient(180deg,rgba(10,18,35,0.97),rgba(6,11,22,0.97));
  border:1px solid var(--border-glow);
  border-radius:var(--radius-card);
  padding:18px 22px;
  margin-bottom:var(--gap);
  box-shadow:var(--shadow-card);
  transition:box-shadow .25s ease;
}
.chart-card:hover { box-shadow:var(--shadow-card),var(--shadow-glow); }
.chart-interval-bar { display:none; }
/* AMRO Context Panel (replaces TradingView chart) */
.amro-context-panel {
  flex:1; min-height:0; display:flex; flex-direction:column;
  gap:0; overflow:hidden;
}
.acp-head {
  flex-shrink:0;
  position:relative;
  z-index:2;
  padding-bottom:12px;
  margin-bottom:0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:linear-gradient(180deg, #0b1526 0%, #0a1322 100%);
}
/* Position calculator — main ops column (moved from sidebar) */
.ops-left-split {
  min-height:0;
  height:auto;
  display:grid;
  grid-template-columns:1fr;
  border-right:none;
}
@media (min-width:901px) {
  .ops-left-split {
    height:100%;
    grid-template-columns:1fr 1fr;
    border-right:1px solid rgba(255,255,255,0.05);
  }
}
.ops-calculator {
  min-height:0;
  height:auto;
  overflow-y:visible;
  padding:12px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  scrollbar-width:thin;
}
@media (min-width:901px) {
  .ops-calculator {
    height:100%;
    overflow-y:auto;
    border-bottom:none;
  }
}
.panel-calc-ops {
  position:relative;
  margin:0;
  height:100%;
  min-height:min(280px, 100%);
  padding:0;
  border:none;
  border-radius:0;
  background:transparent;
  box-shadow:none;
}
.panel-calc-ops .panel-title { display:none; }
.ops-calculator .ops-section-title { margin-bottom:10px; }
.panel-calc-ops .calc-grid {
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.panel-calc-ops .calc-input { font-size:13px; padding:7px 9px; }
.panel-calc-ops .calc-result-val { font-size:13px; }
.panel-calc-ops .calc-entry-bar { font-size:12px; padding:6px 9px; }
.panel-calc-ops .calc-dir-btn { font-size:11px; padding:6px; }
.panel-calc-ops .calc-label { font-size:10px; }
.panel-calc-ops .calc-result-label { font-size:10px; }
.acp-head-row {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-wrap:wrap;
}
